<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng hợp doanh thu bác sĩ</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --success: #16a34a;
            --success-hover: #15803d;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            color: #0f172a;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }

        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upload-group p {
            margin: 0;
            font-weight: 500;
            font-size: 14px;
            color: #475569;
        }

        /* Định dạng lại Input File hiện đại */
        input[type="file"] {
            padding: 12px;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
            font-size: 14px;
        }

        input[type="file"]:hover {
            border-color: var(--primary);
            background: #f0fdf4;
        }

        input[type="file"]::file-selector-button {
            background-color: #334155;
            color: white;
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
            transition: background-color 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #1e293b;
        }

        /* Group Buttons */
        .btn-group {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        #downloadTemplateBtn {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #cbd5e1;
        }

        #downloadTemplateBtn:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }

        #exportBtn {
            background-color: var(--success);
            color: white;
        }

        #exportBtn:hover {
            background-color: var(--success-hover);
        }

        #exportBtn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Trạng thái Loading phong cách mới */
        #loading {
            display: none;
            font-size: 14px;
            margin-top: 16px;
            font-weight: 600;
            color: #0369a1;
            padding: 12px 16px;
            background-color: #e0f2fe;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            width: fit-content;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Định dạng bảng dữ liệu chuyên nghiệp */
        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 0;
        }

        th, td {
            padding: 12px 14px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--border-color);
            color: #334155;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }

        /* Giữ nguyên yêu cầu căn giữa của header gốc bằng CSS tinh tế hơn */
        th { text-align: center; }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        /* Class đặc thù từ dữ liệu JS đổ vào */
        td.center {
            text-align: center;
        }

        td.number {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header-section">
        <h1>Tổng hợp doanh thu bác sĩ khám chữa bệnh theo yêu cầu</h1>
    </div>

    <div class="card">
        <div class="upload-group">
            <p>Chọn file Excel (*.xls, *.xlsx) chứa bảng chi tiết:</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls">
        </div>

        <div class="btn-group">
            <button id="downloadTemplateBtn">📁 Tải file mẫu (Excel)</button>
            <button id="exportBtn" disabled>📥 Xuất Excel (file tổng hợp)</button>
        </div>

        <div id="loading">⏳ Đang xử lý dữ liệu, vui lòng chờ trong giây lát...</div>
    </div>

    <div class="table-container">
        <table id="resultTable">
            <thead>
            <tr>
                <th>Stt</th>
                <th>Tháng</th>
                <th>Tên phòng khám</th>
                <th>Họ tên BS khám bệnh</th>
                <th>Số ca</th>
                <th>Đơn giá</th>
                <th>Thành tiền</th>
                <th>Số ca Xét nghiệm</th>
                <th>Số ca CĐHA</th>
                <th>Số ca Lãnh thuốc</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let workbookData = null;
let finalData = [];

// ====== TẢI FILE MẪU (GIỐNG FILE ANH GỬI) ======
document.getElementById("downloadTemplateBtn").addEventListener("click", function () {
    const templateData = [
        [
            "Stt",
            "Mã BA",
            "Họ tên bệnh nhân",
            "Họ tên BS khám bệnh",
            "Tháng",
            "Phòng",
            "Số ca",
            "Đơn giá",
            "Thành tiền",
            "thuốc",
            "xét nghiệm",
            "CĐHA"
        ],
        // 1 dòng ví dụ
        [
            1,
            "2509100190",
            "NGUYỄN VĂN THỨC",
            "Bs. Huỳnh Ngọc Tân",
            "09",
            "PHÒNG KHÁM DV NGOAI 04",
            1,
            100000,
            100000,
            "",
            "",
            1
        ]
    ];

    const ws = XLSX.utils.aoa_to_sheet(templateData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "ChiTiet");
    XLSX.writeFile(wb, "Mau_ChiTiet_BacSi.xlsx");
});

// ====== ĐỌC FILE ======
document.getElementById("fileInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    showLoading(true);

    const reader = new FileReader();
    reader.onload = function (e) {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type: "array"});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        workbookData = XLSX.utils.sheet_to_json(sheet, {header: 1});

        processData();
        showLoading(false);
    };
    reader.readAsArrayBuffer(file);
});

function showLoading(status) {
    document.getElementById("loading").style.display = status ? "block" : "none";
}

function parseNumber(value) {
    if (typeof value === "number") return value;
    return Number(String(value).replace(/[^\d]/g, "")) || 0;
}

function formatMoney(num) {
    return new Intl.NumberFormat('vi-VN').format(num);
}

function processData() {
    const rows = workbookData;
    const header = rows[0];

    const idxThang = header.indexOf("Tháng");
    // chấp nhận 2 kiểu tên cột
    let idxBS = header.indexOf("Họ tên BS khám bệnh");
    if (idxBS === -1) idxBS = header.indexOf("Họ tên bác sĩ khám bệnh");

    const idxPhong   = header.indexOf("Phòng");
    const idxSoCa    = header.indexOf("Số ca");
    const idxDonGia  = header.indexOf("Đơn giá");
    const idxThuoc   = header.indexOf("thuốc");
    const idxXN      = header.indexOf("xét nghiệm");
    const idxCDHA    = header.indexOf("CĐHA");

    const groups = new Map();

    for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r || r.length < 8) continue;

        const thang = String(r[idxThang] || "").trim();
        const phong = String(r[idxPhong] || "").trim();
        const bs    = String(r[idxBS] || "").trim();
        const key   = thang + "||" + phong + "||" + bs;

        const soCa   = parseNumber(r[idxSoCa] || 1);
        const donGia = parseNumber(r[idxDonGia]);
        const thuoc  = parseNumber(r[idxThuoc]) > 0 ? 1 : 0;
        const xn     = parseNumber(r[idxXN]) > 0 ? 1 : 0;
        const cdha   = parseNumber(r[idxCDHA]) > 0 ? 1 : 0;

        if (!groups.has(key)) {
            groups.set(key, {
                thang, phong, bs,
                soCa: 0, thuoc: 0, xn: 0, cdha: 0,
                donGia: donGia || 0
            });
        }

        const g = groups.get(key);
        g.soCa += soCa;
        g.thuoc += thuoc;
        g.xn    += xn;
        g.cdha  += cdha;
        if (!g.donGia && donGia) g.donGia = donGia;
    }

    renderTable(groups);
}

function renderTable(groups) {
    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    finalData = [];
    finalData.push([
        "Stt", "Tháng", "Tên phòng khám", "Họ tên BS khám bệnh",
        "Số ca", "Đơn giá", "Thành tiền", "Số ca Xét nghiệm",
        "Số ca CĐHA", "Số ca Lãnh thuốc"
    ]);

    let stt = 1;

    [...groups.values()]
        .sort((a, b) => a.thang.localeCompare(b.thang))
        .forEach(g => {
            const thanhTien = g.soCa * g.donGia;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="center">${stt}</td>
                <td class="center">${g.thang}</td>
                <td>${g.phong}</td>
                <td>${g.bs}</td>
                <td class="center">${g.soCa}</td>
                <td class="number">${formatMoney(g.donGia)}</td>
                <td class="number">${formatMoney(thanhTien)}</td>
                <td class="center">${g.xn}</td>
                <td class="center">${g.cdha}</td>
                <td class="center">${g.thuoc}</td>
            `;
            tbody.appendChild(tr);

            finalData.push([
                stt, g.thang, g.phong, g.bs,
                g.soCa, g.donGia, thanhTien,
                g.xn, g.cdha, g.thuoc
            ]);

            stt++;
        });

    document.getElementById("exportBtn").disabled = false;
}

// ====== EXPORT ======
document.getElementById("exportBtn").addEventListener("click", function () {
    const ws = XLSX.utils.aoa_to_sheet(finalData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "TongHop");
    XLSX.writeFile(wb, "TongHop_BacSi.xlsx");
});
</script>

</body>
</html>
